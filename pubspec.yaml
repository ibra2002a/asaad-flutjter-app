name: asaad_digital_marketing
description: اصعد للإعلانات والتسويق الرقمي - تطبيق احترافي متكامل
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.7.0

  # Google Sign In
  google_sign_in: ^6.2.0

  # State Management
  provider: ^6.1.1

  # UI Components
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  fl_chart: ^0.65.0
  dotted_border: ^2.1.0
  flutter_rating_bar: ^4.0.1

  # Utilities
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.0.5
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  permission_handler: ^11.2.0

  # Network & HTTP
  http: ^1.1.2
  dio: ^5.4.0

  # PDF
  pdf: ^3.10.7
  printing: ^5.11.3

  # Audio
  record: ^5.0.4
  just_audio: ^0.9.36
  audioplayers: ^5.2.1

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Media
  video_player: ^2.8.2
  chewie: ^1.7.4

  # Chat
  dash_chat_2: ^0.0.19

  # Other
  url_launcher: ^6.2.3
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.2
  connectivity_plus: ^5.0.2
  flutter_animate: ^4.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
